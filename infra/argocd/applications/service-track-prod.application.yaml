apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-track-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: service-track
  source:
    repoURL: https://github.com/Claudio712005/ServiceTrack-API.git
    targetRevision: main
    path: infra/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: service-track
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
