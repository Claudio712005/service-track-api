apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: service-track
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Ordens de serviço - API ServiceTrack
  sourceRepos:
    - https://github.com/Claudio712005/service-track-api.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: service-track
    - server: https://kubernetes.default.svc
      namespace: argocd
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: batch
      kind: Job
    - group: autoscaling
      kind: HorizontalPodAutoscaler
  orphanedResources:
    warn: true
    ignore:
      - kind: Secret
        name: service-track-secret
      - kind: Secret
        name: service-track-jwt
      - kind: Secret
        name: db-init-creds
      - kind: ConfigMap
        name: service-track-runtime
      - kind: ConfigMap
        name: db-init-script
      - kind: ConfigMap
        name: kube-root-ca.crt
      - kind: Job
        name: service-track-db-init
