kind: Deployment
apiVersion: apps/v1
metadata:
  name: service-track-app
  namespace: service-track
  labels:
    app: service-track-app
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: service-track-app
  template:
    metadata:
      labels:
        app: service-track-app
    spec:
      containers:
        - name: service-track-app
          image: ${ECR_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: service-track-config
            - secretRef:
                name: service-track-secret
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
