apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: service-track

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: service-track

images:
  - name: servicetrack-api
    newTag: latest
