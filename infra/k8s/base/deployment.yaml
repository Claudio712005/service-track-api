apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-track-app
  labels:
    app: service-track-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: service-track-app
  template:
    metadata:
      labels:
        app: service-track-app
    spec:
      containers:
        - name: service-track-app
          image: servicetrack-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            # Config estatica versionada no Git (gerenciada pelo ArgoCD).
            - configMapRef:
                name: service-track-config
            # Config dinamica (DB_JDBC_URL, SERVICETRACK_API_BASE_URL) provisionada
            # por scripts/bootstrap-prod.sh — fora do Git.
            - configMapRef:
                name: service-track-runtime
            - secretRef:
                name: service-track-secret
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: jwt-keys
          secret:
            secretName: service-track-jwt
