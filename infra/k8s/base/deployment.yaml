apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-track-app
  labels:
    app: service-track-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # replicas omitido de proposito: em prod quem gerencia e o HPA (min 2 / max 10).
  # Fixar aqui faria o ArgoCD (selfHeal) brigar com o HPA a cada scale.
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: service-track-app
  template:
    metadata:
      labels:
        app: service-track-app
    spec:
      # Espalha as replicas entre as AZs (us-east-1a/1b) para alta disponibilidade:
      # se uma zona cair, a outra segue servindo. ScheduleAnyway = preferencia,
      # nao bloqueia o scheduling se uma zona estiver sem capacidade.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: service-track-app
      containers:
        - name: service-track-app
          image: servicetrack-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            # Config estatica versionada no Git (gerenciada pelo ArgoCD).
            - configMapRef:
                name: service-track-config
            # Config dinamica (DB_JDBC_URL, SERVICETRACK_API_BASE_URL) provisionada
            # por scripts/bootstrap-prod.sh — fora do Git.
            - configMapRef:
                name: service-track-runtime
            - secretRef:
                name: service-track-secret
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: jwt-keys
          secret:
            secretName: service-track-jwt
