apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: service-track

resources:
- ../../base
- hpa.yaml
- service-lb.yaml

# A pipeline (cd-app.yml) sobrescreve newName/newTag via `kustomize edit set image`
# apontando para o ECR e o git-sha. O commit resultante dispara o sync do ArgoCD.
images:
- name: servicetrack-api
  newName: 123124496645.dkr.ecr.us-east-1.amazonaws.com/service-track-app
  newTag: 835320a0189423564c3ed93c840c52b90a932e81

replicas:
- count: 2
  name: service-track-app

# Apenas config ESTATICA aqui. Valores dinamicos (DB_JDBC_URL, SERVICETRACK_API_BASE_URL)
# vao para o ConfigMap `service-track-runtime`, criado por scripts/bootstrap-prod.sh
# (fora do Git, pois dependem de outputs do Terraform e do hostname do LoadBalancer).
configMapGenerator:
- literals:
  - QUARKUS_PROFILE=prod
  - QUARKUS_MAILER_FROM=no-reply@clausilva.com.br
  - MP_JWT_VERIFY_PUBLICKEY_LOCATION=file:/keys/publicKey.pem
  - SMALLRYE_JWT_SIGN_KEY_LOCATION=file:/keys/privateKey.pem
  name: service-track-config

generatorOptions:
  disableNameSuffixHash: true
