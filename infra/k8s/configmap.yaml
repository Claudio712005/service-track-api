apiVersion: v1
kind: ConfigMap
metadata:
  name: service-track-config
  namespace: service-track
data:
  QUARKUS_PROFILE: "dev"
  QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://service-track-postgres:5432/servicetrack"
  QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: "drop-and-create"
  QUARKUS_MAILER_FROM: "no-reply@servicetrack.local"
  QUARKUS_MAILER_HOST: "localhost"
