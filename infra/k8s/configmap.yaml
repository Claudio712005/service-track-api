apiVersion: v1
kind: ConfigMap
metadata:
  name: service-track-config
  namespace: service-track
data:
  QUARKUS_PROFILE: "prod"
  DB_JDBC_URL: "${RDS_JDBC_URL}"
  QUARKUS_MAILER_FROM: "no-reply@servicetrack.local"
  QUARKUS_MAILER_HOST: "mailhog"
  QUARKUS_MAILER_PORT: "1025"
  QUARKUS_MAILER_MOCK: "false"
  QUARKUS_MAILER_START_TLS: "DISABLED"
  QUARKUS_MAILER_AUTH_METHODS: "DISABLED"
  MP_JWT_VERIFY_PUBLICKEY_LOCATION: "file:/keys/publicKey.pem"
  SMALLRYE_JWT_SIGN_KEY_LOCATION: "file:/keys/privateKey.pem"
