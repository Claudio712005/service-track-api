# Postgres do banco do ServiceTrack — efemero (sem volume persistente) para a v1.
# Os dados somem quando o pod reinicia; ok porque o app recria o schema (drop-and-create).
---
apiVersion: v1
kind: Secret
metadata:
  name: service-track-db
  namespace: service-track
type: Opaque
stringData:
  POSTGRES_DB: servicetrack
  POSTGRES_USER: servicetrack
  POSTGRES_PASSWORD: servicetrack
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-track-postgres
  namespace: service-track
  labels:
    app: service-track-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-track-postgres
  template:
    metadata:
      labels:
        app: service-track-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: service-track-db
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "servicetrack", "-d", "servicetrack"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: service-track-postgres
  namespace: service-track
spec:
  selector:
    app: service-track-postgres
  ports:
    - port: 5432
      targetPort: 5432
