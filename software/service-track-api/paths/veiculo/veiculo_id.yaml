delete:
  summary: Excluir um veículo existente. Requer autenticação do cliente.
  operationId: excluirVeiculo
  tags:
    - Veículos

  security:
    - bearerAuth: []

  parameters:
    - name: id
      in: path
      required: true
      description: ID do veículo a ser excluído
      schema:
        type: string

  responses:
    '204':
      description: Veículo excluído com sucesso (sem conteúdo)
    '400':
      description: Requisição inválida (ID ausente ou formato incorreto)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '401':
      description: Não autorizado (token de autenticação ausente ou inválido)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '404':
      description: Veículo não encontrado (ID inexistente ou pertencente a outro cliente)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'