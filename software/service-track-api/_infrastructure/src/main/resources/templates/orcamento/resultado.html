<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{titulo}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; color:#1f2937;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="min-height:100vh; background-color:#f4f6f8;">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0" style="max-width:480px; width:100%; background-color:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(15,23,42,0.08);">
          <tr>
            <td style="background-color:{cor}; padding:28px 32px; text-align:center;">
              <div style="font-size:44px; line-height:1;">{icone}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:32px; text-align:center;">
              <h1 style="margin:0 0 12px 0; font-size:22px; color:#111827; font-weight:700;">{titulo}</h1>
              <p style="margin:0 0 20px 0; font-size:15px; line-height:1.6; color:#4b5563;">{mensagem}</p>
              {#if os}
              <p style="margin:0; font-size:13px; color:#6b7280;">
                Ordem de Serviço <strong style="color:#374151;">#{os}</strong>
              </p>
              {/if}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px 28px 32px; border-top:1px solid #e5e7eb; background-color:#f9fafb; text-align:center;">
              <p style="margin:0; font-size:12px; color:#9ca3af;">
                🛠️ ServiceTrack &middot; Você já pode fechar esta página.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
