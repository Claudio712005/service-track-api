uarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${APP_DB_USER:app_user}
quarkus.datasource.password=${APP_DB_PASSWORD:app_user}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/servicetrack}

quarkus.hibernate-orm.database.generation=validate

quarkus.datasource.migration.db-kind=postgresql
quarkus.datasource.migration.username=${FLYWAY_DB_USER:flyway_user}
quarkus.datasource.migration.password=${FLYWAY_DB_PASSWORD:flyway_user}
quarkus.datasource.migration.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/servicetrack}

quarkus.flyway.migration.migrate-at-start=true
quarkus.flyway.migration.locations=classpath:db/migration
quarkus.flyway.migration.table=flyway_schema_history

quarkus.flyway.migrate-at-start=false
