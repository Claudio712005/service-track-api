quarkus.datasource.devservices.enabled=false

quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:servicetrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# JWT
servicetrack.jwt.secret=${JWT_SECRET:ServiceTrackSecretKey2024@#$%ServiceTrack}
servicetrack.jwt.expiracao-horas=8

mp.jwt.verify.issuer=service-track-api
mp.jwt.verify.publickey.location=keys/publicKey.pem
mp.jwt.verify.publickey.algorithm=RS256

quarkus.http.auth.proactive=false