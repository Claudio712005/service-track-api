%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:servicetrack-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false

%test.servicetrack.jwt.secret=TestSecretKeyForIntegrationTests2024@#$%
%test.servicetrack.jwt.expiracao-horas=1
%test.mp.jwt.verify.issuer=service-track-api

# quarkus-jacoco: escreve o exec dentro de build/jacoco/ para que
# o task jacocoTestReport do Gradle encontre junto com test.exec
%test.quarkus.jacoco.data-file=build/jacoco/quarkus-test.exec
%test.quarkus.jacoco.reuse-data-file=true
