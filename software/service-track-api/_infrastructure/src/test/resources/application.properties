quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:servicetrack-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file
quarkus.hibernate-orm.log.sql=false

servicetrack.jwt.expiracao-horas=1

quarkus.jacoco.data-file=build/jacoco/quarkus-test.exec
quarkus.jacoco.reuse-data-file=true

quarkus.rest-client.fipe-api.url=http://localhost:9999
quarkus.rest-client.unsplash-api.url=http://localhost:9999
unsplash.chave-acesso=chave-teste

quarkus.mailer.mock=true

MP_Fault_Tolerance_NonFallback_Enabled=false

