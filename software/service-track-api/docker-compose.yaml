services:
  postgres:
    image: postgres:16-alpine
    container_name: servicetrack-postgres
    restart: unless-stopped
    networks:
      - servicetrack-network
    environment:
      POSTGRES_DB: servicetrack
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_DB_USER: ${FLYWAY_DB_USER}
      FLYWAY_DB_PASSWORD: ${FLYWAY_DB_PASSWORD}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d servicetrack"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: servicetrack-mailhog
    restart: unless-stopped
    networks:
      - servicetrack-network
    ports:
      - "1025:1025"  
      - "8025:8025" 

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicetrack-api
    restart: unless-stopped
    networks:
      - servicetrack-network
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      QUARKUS_PROFILE: prod
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      FLYWAY_DB_USER: ${FLYWAY_DB_USER}
      FLYWAY_DB_PASSWORD: ${FLYWAY_DB_PASSWORD}
      DB_JDBC_URL: ${POSTGRES_JDBC_URL}
      UNSPLASH_CHAVE_ACESSO: ${UNSPLASH_CHAVE_ACESSO}
      QUARKUS_MAILER_HOST: mailhog
      QUARKUS_MAILER_PORT: "1025"
      QUARKUS_MAILER_MOCK: "false"
      QUARKUS_MAILER_START_TLS: DISABLED
      QUARKUS_MAILER_AUTH_METHODS: DISABLED
      QUARKUS_MAILER_FROM: ${QUARKUS_MAILER_FROM:-no-reply@servicetrack.local}
    ports:
      - "8080:8080"

volumes:
  postgres_data:

networks:
  servicetrack-network:
    driver: bridge
