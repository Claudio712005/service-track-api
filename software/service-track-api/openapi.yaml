openapi: 3.0.3
info:
  title: Service Track API
  version: 1.0.0
  description: API para gerenciamento do Service Track

paths:
  /users:
    post:
      summary: Cria um novo usuário
      operationId: createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Dados inválidos enviados pelo cliente

components:
  schemas:
    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
        - dateOfBirth
        - phoneNumber
        - cpf
        - role
      properties:
        name:
          type: string
          example: "João da Silva"
        email:
          type: string
          format: email
          example: "joao@email.com"
        password:
          type: string
          format: password
          example: "SenhaForte123!"
        dateOfBirth:
          type: string
          format: date
          example: "1990-05-15"
        phoneNumber:
          type: string
          example: "+5511999999999"
        cpf:
          type: string
          example: "12345678900"
        role:
          type: string
          enum: [ ADMIN, MANAGER, USER ] # Ajuste conforme seu br.com.servicetrack.domain.enums.UserRole

    # DTO de SAÍDA: O que a API devolve.
    # Inclui o ID gerado, datas de controle, mas NUNCA a senha.
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "João da Silva"
        email:
          type: string
          format: email
          example: "joao@email.com"
        dateOfBirth:
          type: string
          format: date
          example: "1990-05-15"
        phoneNumber:
          type: string
          example: "+5511999999999"
        cpf:
          type: string
          example: "12345678900"
        role:
          type: string
          example: "USER"
        enabled:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: "2026-03-21T10:00:00Z"