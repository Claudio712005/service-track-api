post:
  summary: Redefinir senha do usuário autenticado. Requer senha atual, nova senha e confirmação.
  operationId: resetarSenha
  tags:
    - Login
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/autenticacao/ResetarSenhaRequest.yaml'
  responses:
    '204':
      description: Senha redefinida com sucesso
    '400':
      description: Dados de entrada inválidos (nova senha não atende à política ou confirmação diverge)
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '401':
      description: Senha atual incorreta ou usuário não autenticado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '404':
      description: Usuário não encontrado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
