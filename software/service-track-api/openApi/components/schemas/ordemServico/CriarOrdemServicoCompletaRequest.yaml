type: object
required:
  - motivo
  - clienteId
  - veiculoId
  - servicos
  - insumos
properties:
  motivo:
    type: string
    description: Motivo da ordem de serviço
  clienteId:
    type: string
    description: ID do cliente dono do veículo
  veiculoId:
    type: string
    description: ID do veículo atendido
  observacao:
    type: string
    description: Observação adicional sobre a ordem de serviço
  servicos:
    type: array
    minItems: 1
    description: Serviços diagnosticados pelo mecânico
    items:
      type: object
      required:
        - servicoId
      properties:
        servicoId:
          type: string
          description: ID do serviço do catálogo
        valorCobrado:
          type: number
          format: double
          description: Valor cobrado; se omitido, usa o valorReferência do catálogo
  insumos:
    type: array
    minItems: 1
    description: Peças/insumos diagnosticados pelo mecânico
    items:
      type: object
      required:
        - insumoId
        - quantidade
      properties:
        insumoId:
          type: string
          description: ID do insumo do catálogo
        quantidade:
          type: integer
          minimum: 1
          description: Quantidade a utilizar
