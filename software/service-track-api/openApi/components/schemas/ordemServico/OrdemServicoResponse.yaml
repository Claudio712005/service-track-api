type: object
properties:
  id:
    type: string
    format: uuid
    example: "4d32c6ae-46d1-403d-8e65-d9527126d093"
  motivo:
    type: string
    example: "Troca de óleo e revisão geral"
  observacao:
    type: string
    example: "Veículo apresenta ruído no motor"
  clienteId:
    type: string
    format: uuid
  mecanicoId:
    type: string
    format: uuid
  veiculoId:
    type: string
    format: uuid
  status:
    type: string
    enum: [RECEBIDA, EM_DIAGNOSTICO, AGUARDANDO_APROVACAO, EM_EXECUCAO, FINALIZADA, ENTREGUE, CANCELADA]
    example: RECEBIDA
  dataCriacao:
    type: string
    format: date-time
    example: "2024-06-01T14:30:00"
  dataAtualizacao:
    type: string
    format: date-time
    example: "2024-06-05T10:15:00"
  itensServico:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          format: uuid
        servicoId:
          type: string
          format: uuid
        valor:
          type: number
          format: double
        feito:
          type: boolean
        mecanicoResponsavelId:
          type: string
          format: uuid
        dataRealizacao:
          type: string
          format: date-time
        observacao:
          type: string
  insumos:
    type: array
    description: Lista de IDs dos insumos associados à OS (repetidos conforme quantidade)
    items:
      type: string
      format: uuid
  orcamento:
    type: object
    properties:
      id:
        type: string
        format: uuid
      custoMaoDeObra:
        type: number
        format: double
      custoInsumos:
        type: number
        format: double
      valorTotal:
        type: number
        format: double
      aprovado:
        type: boolean
      observacao:
        type: string
      dataCriacao:
        type: string
        format: date-time
      dataAtualizacao:
        type: string
        format: date-time
