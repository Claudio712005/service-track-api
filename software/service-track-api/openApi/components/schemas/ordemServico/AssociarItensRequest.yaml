type: object
required:
  - servicos
  - insumos
properties:
  servicos:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - servicoId
      properties:
        servicoId:
          type: string
          format: uuid
          description: ID do serviço do catálogo
        valorCobrado:
          type: number
          format: double
          description: Valor cobrado; se omitido, usa o valorReferência do catálogo
  insumos:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - insumoId
        - quantidade
      properties:
        insumoId:
          type: string
          format: uuid
          description: ID do insumo do catálogo
        quantidade:
          type: integer
          minimum: 1
          description: Quantidade a utilizar
