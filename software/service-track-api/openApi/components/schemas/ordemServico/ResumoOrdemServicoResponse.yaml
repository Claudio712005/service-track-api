type: object
properties:
  id:
    type: string
    format: uuid
    example: "4d32c6ae-46d1-403d-8e65-d9527126d093"
  mecanicoId:
    type: string
    format: uuid
  clienteId:
    type: string
    format: uuid
  veiculoId:
    type: string
    format: uuid
  motivo:
    type: string
    example: "Troca de óleo e revisão geral"
  observacao:
    type: string
    example: "Veículo apresenta ruído no motor"
  status:
    type: string
    enum: [RECEBIDA, EM_DIAGNOSTICO, AGUARDANDO_APROVACAO, EM_EXECUCAO, FINALIZADA, ENTREGUE, CANCELADA]
    example: RECEBIDA
