type: object
required:
    - placa
    - modelo
    - marca
    - ano
properties:
    placa:
        type: string
        example: "ABC-1234"
    modelo:
        type: string
        example: "Civic"
    marca:
        type: string
        example: "Honda"
    ano:
        type: integer
        minimum: 1886
        example: 2020