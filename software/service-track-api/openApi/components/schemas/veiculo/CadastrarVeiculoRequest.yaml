type: object
required:
  - placa
  - modelo
  - marca
  - ano
  - proprietarioId
properties:
  placa:
    type: string
    example: "ABC1D23"
  modelo:
    type: string
    example: "Corolla"
  marca:
    type: string
    example: "Toyota"
  ano:
    type: integer
    minimum: 1886
    example: 2022
  proprietarioId:
    type: string
    format: uuid
  urlImagem:
    type: string
    nullable: true
    example: "https://images.unsplash.com/photo-abc123"
