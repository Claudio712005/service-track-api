get:
  summary: Listar serviços disponíveis (nome e descrição). Acessível a clientes e mecânicos.
  operationId: listarCatalogoServicos
  tags:
    - Catalogo
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Catálogo de serviços
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/catalogo/CatalogoServicoResponse.yaml'
    '401':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
