get:
  summary: Listar insumos disponíveis (nome e descrição). Acessível a clientes e mecânicos.
  operationId: listarCatalogoInsumos
  tags:
    - Catalogo
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Catálogo de insumos
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/catalogo/CatalogoInsumoResponse.yaml'
    '401':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
