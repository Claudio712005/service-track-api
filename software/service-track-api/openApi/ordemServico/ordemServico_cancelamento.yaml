post:
  summary: |
    Cancelar OS. Apenas o cliente titular.
    Permitido nos status: RECEBIDA, AGUARDANDO_APROVACAO.
    Se AGUARDANDO_APROVACAO: insumos reservados são devolvidos ao estoque.
  operationId: cancelarOrdemServico
  tags:
    - OrdemServico
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: '../components/schemas/ordemServico/CancelarOsRequest.yaml'
  responses:
    '200':
      description: OS cancelada com sucesso
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ordemServico/ResumoOrdemServicoResponse.yaml'
    '400':
      description: Status atual não permite cancelamento pelo cliente
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '401':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '403':
      description: Apenas o cliente titular pode cancelar a OS
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '404':
      description: OS não encontrada
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
