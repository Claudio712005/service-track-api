post:
  summary: Criar uma nova ordem de serviço. Exclusivo para clientes.
  operationId: criarOrdemServico
  tags:
    - OrdemServico
  security:
    - bearerAuth: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/ordemServico/OrdemServicoRequest.yaml'
  responses:
    '201':
      description: Ordem de serviço criada com sucesso
    '400':
      description: Dados inválidos
      content:
      application/json:
        schema:
        $ref: '../components/schemas/ErroResponse.yaml'
    '401':
      description: Não autorizado
      content:
      application/json:
        schema:
        $ref: '../components/schemas/ErroResponse.yaml'
    '403':
      description: Acesso restrito
      content:
      application/json:
        schema:
        $ref: '../components/schemas/ErroResponse.yaml'
