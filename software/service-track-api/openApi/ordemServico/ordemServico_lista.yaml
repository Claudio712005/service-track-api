get:
  summary: Listar ordens de serviço com filtros e paginação. Clientes veem apenas as suas.
  operationId: listarOrdensServico
  tags:
    - OrdemServico
  security:
    - bearerAuth: []
  parameters:
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum: [RECEBIDA, EM_DIAGNOSTICO, AGUARDANDO_APROVACAO, EM_EXECUCAO, FINALIZADA, ENTREGUE, CANCELADA]
    - name: clienteId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Ignorado se o solicitante for cliente (usa o próprio ID automaticamente)
    - name: mecanicoId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    - name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    '200':
      description: Lista paginada de ordens de serviço
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ordemServico/PageOrdemServicoResponse.yaml'
    '401':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
