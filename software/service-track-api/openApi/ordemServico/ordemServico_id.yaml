get:
  summary: Buscar ordem de serviço por ID. Mecânico vê qualquer OS; cliente vê apenas as suas.
  operationId: buscarOrdemServico
  tags:
    - OrdemServico
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Ordem de serviço encontrada
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ordemServico/OrdemServicoResponse.yaml'
    '401':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '403':
      description: Acesso restrito
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '404':
      description: OS não encontrada
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
