post:
  summary: Enviar OS para diagnóstico. Apenas o mecânico vinculado. Transição RECEBIDA → EM_DIAGNOSTICO.
  operationId: enviarParaDiagnostico
  tags:
    - OrdemServico
  security:
    - bearerAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: OS enviada para diagnóstico
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ordemServico/ResumoOrdemServicoResponse.yaml'
    '400':
      description: Transição de status inválida
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '401':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '403':
      description: Apenas o mecânico vinculado pode executar esta ação
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
    '404':
      description: OS não encontrada
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErroResponse.yaml'
