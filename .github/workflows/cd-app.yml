name: CD - App (GitOps)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/k8s/overlays/prod/kustomization.yaml'
  workflow_dispatch:

permissions:
  contents: write  

env:
  AWS_REGION: us-east-1
  APP_DIR: software/service-track-api
  ECR_REPO: service-track-app
  OVERLAY_DIR: infra/k8s/overlays/prod

jobs:
  build-and-bump:
    name: Build, push e bump (GitOps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir referencia da imagem
        run: |
          echo "IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}

      - name: Instalar kustomize
        run: |
          curl -sfL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump da imagem no overlay (GitOps)
        run: |
          cd "$OVERLAY_DIR"
          kustomize edit set image servicetrack-api="${IMAGE}"

      - name: Commit e push do bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY_DIR/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "Sem mudanca de imagem; nada a commitar."
          else
            git commit -m "chore(cd): deploy image ${{ github.sha }} [skip ci]"
            git push origin main
          fi

      - name: Resumo
        run: |
          echo "Imagem publicada: ${IMAGE}"
          echo "ArgoCD ira sincronizar o app automaticamente a partir do overlay de prod."
