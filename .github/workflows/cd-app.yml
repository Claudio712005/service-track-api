name: CD - App (GitOps)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/k8s/overlays/prod/kustomization.yaml'
  workflow_dispatch:

permissions:
  contents: write  

env:
  AWS_REGION: us-east-1
  APP_DIR: software/service-track-api
  ECR_REPO: service-track-app
  OVERLAY_DIR: infra/k8s/overlays/prod
  CLUSTER_NAME: servicetrack-dev

jobs:
  build-and-bump:
    name: Build, push e bump (GitOps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir referencia da imagem
        run: |
          echo "IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}

      - name: Instalar kustomize
        run: |
          KUSTOMIZE_VERSION=5.4.3
          curl -sfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o kustomize.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Bump da imagem no overlay (GitOps)
        run: |
          cd "$OVERLAY_DIR"
          kustomize edit set image servicetrack-api="${IMAGE}"

      - name: Commit e push do bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OVERLAY_DIR/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "Sem mudanca de imagem; nada a commitar."
          else
            git commit -m "chore(cd): deploy image ${{ github.sha }} [skip ci]"
            git push origin main
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Resumo (imagem + URLs)
        run: |
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION" || true
          API_HOST="$(kubectl -n service-track get svc service-track-app-lb \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
          ARGO_HOST="$(kubectl -n argocd get svc argocd-server \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
          {
            echo "## ServiceTrack — Deploy (GitOps)"
            echo ""
            echo "| Item | Valor |"
            echo "|---|---|"
            echo "| Imagem | \`${IMAGE}\` |"
            echo "| API publica | ${API_HOST:+http://$API_HOST} |"
            echo "| Swagger | ${API_HOST:+http://$API_HOST/q/swagger-ui} |"
            echo "| ArgoCD | ${ARGO_HOST:+http://$ARGO_HOST} |"
            echo ""
            echo "O ArgoCD sincroniza o app a partir do commit de bump da imagem."
          } >> "$GITHUB_STEP_SUMMARY"
