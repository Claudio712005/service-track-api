name: Security

on:
  push:
    branches: ["main", "develop", "fase-*"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  security-events: write
  actions: read
  contents: read

jobs:

  sast:
    name: SAST · Semgrep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}
          restore-keys: pip-semgrep-

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Run Semgrep
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p software/service-track-api/reports
          semgrep --config=auto \
                  --sarif \
                  --output software/service-track-api/reports/semgrep.sarif \
                  software/service-track-api/ || true

      - name: Upload SARIF (SAST)
        if: always() 
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: software/service-track-api/reports/semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: software/service-track-api/reports/semgrep.sarif
          if-no-files-found: warn
          retention-days: 7

