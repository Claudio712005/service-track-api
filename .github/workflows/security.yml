name: Security

on:
  push:
    branches: ["main", "develop", "fase-*"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  security-events: write
  actions: read
  contents: read

jobs:

  sast:
    name: SAST · Semgrep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}
          restore-keys: pip-semgrep-

      - name: Install Semgrep
        run: pip install semgrep --quiet

      - name: Run Semgrep
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p software/service-track-api/reports
          semgrep --config=auto \
                  --sarif \
                  --output software/service-track-api/reports/semgrep.sarif \
                  software/service-track-api/ || true

      - name: Upload SARIF (SAST)
        if: |
          always() &&
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: software/service-track-api/reports/semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: software/service-track-api/reports/semgrep.sarif
          if-no-files-found: warn
          retention-days: 7


  sca:
    name: SCA · Dependency Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: software/service-track-api

    steps:
      - uses: actions/checkout@v4

      - name: Prepare NVD cache directory
        run: mkdir -p /home/runner/.owasp/data

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: /home/runner/.owasp/data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('software/service-track-api/**/*.gradle.kts') }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p reports

          # --nvdApiKey must be omitted entirely when empty, not passed as blank arg.
          # Empty value → "Missing argument for option: nvdApiKey".
          NVD_ARG=""
          [ -n "${NVD_API_KEY:-}" ] && NVD_ARG="--nvdApiKey $NVD_API_KEY"

          docker run --rm \
            -v ${{ github.workspace }}/software/service-track-api:/src \
            -v /home/runner/.owasp/data:/data \
            owasp/dependency-check:9.0.9 \
            --scan /src \
            --format JSON \
            --out /src/reports \
            --data /data \
            --failOnCVSS 11 \
            --exclude '**/src/test/**' \
            --exclude '**/build/tmp/**' \
            --exclude '**/docs/**' \
            --project "service-track-api" \
            $NVD_ARG

      - name: Convert JSON → SARIF
        run: node scripts/convert-to-sarif.js || true

      - name: Upload SARIF (SCA)
        if: |
          always() &&
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: software/service-track-api/reports/dependency-check.sarif
          category: dependency-check

      - name: Upload raw reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: software/service-track-api/reports/
          if-no-files-found: warn
          retention-days: 7
