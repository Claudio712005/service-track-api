name: CI

on:
  push:
    branches: ["main", "develop", "fase-*"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: software/service-track-api

jobs:
  build:
    name: "Build · Test · Coverage · Sonar"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('software/service-track-api/**/*.gradle.kts', 'software/service-track-api/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Generate JWT keys for infrastructure tests
        run: |
          mkdir -p _infrastructure/src/test/resources/keys
          openssl genrsa -out _infrastructure/src/test/resources/keys/privateKey.pem 2048
          openssl rsa -in _infrastructure/src/test/resources/keys/privateKey.pem \
            -pubout -out _infrastructure/src/test/resources/keys/publicKey.pem

      - name: Build, test, coverage and analyse
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew clean check sonar

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            software/service-track-api/_domain/build/reports/jacoco/test/html/
            software/service-track-api/_application/build/reports/jacoco/test/html/
            software/service-track-api/_infrastructure/build/reports/jacoco/test/html/
          retention-days: 7
