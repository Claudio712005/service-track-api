name: CI

on:
  push:
    branches: ["main", "develop", "fase-*"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: software/service-track-api

jobs:
  domain:
    name: "Domain · Tests & Coverage (100%)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('software/service-track-api/**/*.gradle.kts', 'software/service-track-api/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :_domain:test

      - name: Generate JaCoCo report
        run: ./gradlew :_domain:jacocoTestReport

      - name: Verify coverage (100% instruction + branch)
        run: ./gradlew :_domain:jacocoTestCoverageVerification

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-coverage-report
          path: software/service-track-api/_domain/build/reports/jacoco/test/html/
          retention-days: 7

  application:
    name: "Application · Tests & Coverage (80%)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('software/service-track-api/**/*.gradle.kts', 'software/service-track-api/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :_application:test

      - name: Generate JaCoCo report
        run: ./gradlew :_application:jacocoTestReport

      - name: Verify coverage (80% instruction + branch)
        run: ./gradlew :_application:jacocoTestCoverageVerification

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: application-coverage-report
          path: software/service-track-api/_application/build/reports/jacoco/test/html/
          retention-days: 7

  infrastructure:
    name: "Infrastructure · Tests & Coverage (80%)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('software/service-track-api/**/*.gradle.kts', 'software/service-track-api/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Generate JWT keys for tests
        run: |
          mkdir -p _infrastructure/src/test/resources/keys

          openssl genrsa -out _infrastructure/src/test/resources/keys/privateKey.pem 2048

          openssl rsa -in _infrastructure/src/test/resources/keys/privateKey.pem \
            -pubout -out _infrastructure/src/test/resources/keys/publicKey.pem

      - name: Run integration tests
        run: ./gradlew :_infrastructure:test

      - name: Generate JaCoCo report
        run: ./gradlew :_infrastructure:jacocoTestReport

      - name: Verify coverage (80% instruction + branch, generated code excluded)
        run: ./gradlew :_infrastructure:jacocoTestCoverageVerification

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-coverage-report
          path: software/service-track-api/_infrastructure/build/reports/jacoco/test/html/
          retention-days: 7

  docker:
    name: "Docker · Build & Smoke Test"
    runs-on: ubuntu-latest
    needs: [ domain, application, infrastructure ]

    steps:
      - uses: actions/checkout@v4

      - name: Decode JWT keys from GitHub Secrets
        run: |
          echo "${{ secrets.JWT_PRIVATE_KEY_B64 }}" | base64 -d > /tmp/privateKey.pem
          echo "${{ secrets.JWT_PUBLIC_KEY_B64 }}"  | base64 -d > /tmp/publicKey.pem
          chmod 600 /tmp/privateKey.pem

      - name: Build image and start services
        working-directory: software/service-track-api
        run: |
          export JWT_PRIVATE_KEY=$(cat /tmp/privateKey.pem)
          export JWT_PUBLIC_KEY=$(cat /tmp/publicKey.pem)
          docker compose up -d --build

      - name: Wait for API health check
        run: |
          echo "Aguardando API iniciar..."
          timeout 120 bash -c \
            'until curl -sf http://localhost:8080/q/health/ready; do
               echo "  ainda aguardando..."; sleep 5
             done'
          echo "API pronta."

      - name: Tear down
        if: always()
        working-directory: software/service-track-api
        run: docker compose down -v

  coverage-gate:
    name: "Coverage Gate"
    runs-on: ubuntu-latest
    needs: [ domain, application, infrastructure ]
    if: always()

    defaults:
      run:
        working-directory: .

    steps:
      - name: All coverage checks passed
        run: |
          if [[ "${{ needs.domain.result }}" != "success" || \
                "${{ needs.application.result }}" != "success" || \
                "${{ needs.infrastructure.result }}" != "success" ]]; then
            echo "One or more coverage checks failed."
            echo "  domain:         ${{ needs.domain.result }}"
            echo "  application:    ${{ needs.application.result }}"
            echo "  infrastructure: ${{ needs.infrastructure.result }}"
            exit 1
          fi
          echo "All layers passed coverage verification."