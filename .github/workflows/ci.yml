name: CI

on:
  push:
    branches: ["main", "develop", "fase-*"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: software/service-track-api

jobs:

  domain:
    name: Domain Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: domain-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew
      - run: ./gradlew :_domain:test :_domain:jacocoTestReport

      - uses: actions/upload-artifact@v4
        with:
          name: domain-coverage
          path: _domain/build/reports/jacoco/test/jacocoTestReport.xml


  application:
    name: Application Coverage
    runs-on: ubuntu-latest
    needs: domain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: app-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew
      - run: ./gradlew :_application:test :_application:jacocoTestReport

      - uses: actions/upload-artifact@v4
        with:
          name: application-coverage
          path: _application/build/reports/jacoco/test/jacocoTestReport.xml


  infrastructure:
    name: Infrastructure Coverage
    runs-on: ubuntu-latest
    needs: application
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: infra-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew

      - name: Generate JWT keys
        run: |
          mkdir -p _infrastructure/src/test/resources/keys
          openssl genrsa -out _infrastructure/src/test/resources/keys/privateKey.pem 2048
          openssl rsa -in _infrastructure/src/test/resources/keys/privateKey.pem \
            -pubout -out _infrastructure/src/test/resources/keys/publicKey.pem

      - run: ./gradlew :_infrastructure:test :_infrastructure:jacocoTestReport

      - uses: actions/upload-artifact@v4
        with:
          name: infrastructure-coverage
          path: _infrastructure/build/reports/jacoco/test/jacocoTestReport.xml


  migrations:
    name: Validate Migrations (PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: migrations-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew

      - name: Subir PostgreSQL com os 2 roles (mesmo init script do prod)
        run: |
          docker run -d --name pg-ci \
            -e POSTGRES_DB=servicetrack -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres \
            -e FLYWAY_DB_USER=flyway_user -e FLYWAY_DB_PASSWORD=flyway_ci \
            -e APP_DB_USER=app_user -e APP_DB_PASSWORD=app_ci \
            -v "$PWD/scripts/postgres-init:/docker-entrypoint-initdb.d:ro" \
            -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec pg-ci pg_isready -U postgres -d servicetrack && break
            sleep 2
          done
          docker exec pg-ci psql -U postgres -d servicetrack -tAc \
            "select rolname from pg_roles where rolname in ('flyway_user','app_user');"

      - name: Gerar chaves JWT (necessárias para o boot)
        run: |
          mkdir -p _infrastructure/src/main/resources/keys
          openssl genrsa -out _infrastructure/src/main/resources/keys/privateKey.pem 2048
          openssl rsa -in _infrastructure/src/main/resources/keys/privateKey.pem \
            -pubout -out _infrastructure/src/main/resources/keys/publicKey.pem

      - name: Empacotar a aplicação
        run: ./gradlew :_infrastructure:quarkusBuild -x test

      - name: Aplicar migrations (Flyway=flyway_user) e validar schema (ORM=app_user)
        env:
          QUARKUS_PROFILE: prod
          APP_DB_USER: app_user
          APP_DB_PASSWORD: app_ci
          FLYWAY_DB_USER: flyway_user
          FLYWAY_DB_PASSWORD: flyway_ci
          DB_JDBC_URL: jdbc:postgresql://localhost:5432/servicetrack
          UNSPLASH_CHAVE_ACESSO: ci
        run: |
          java -jar _infrastructure/build/quarkus-app/quarkus-run.jar > app.log 2>&1 &
          APP_PID=$!
          ok=0
          for i in $(seq 1 60); do
            if grep -q "started in" app.log; then ok=1; break; fi
            if grep -qE "Failed to start|missing table|SchemaManagementException" app.log; then break; fi
            kill -0 $APP_PID 2>/dev/null || break
            sleep 2
          done
          kill $APP_PID 2>/dev/null || true
          echo "----------------- app log -----------------"
          cat app.log
          if [ "$ok" != "1" ]; then
            echo "::error::Migrations ou validação de schema falharam"
            exit 1
          fi
          grep -q "Successfully applied" app.log || { echo "::error::Flyway não aplicou migrations"; exit 1; }

      - name: Garantir que app_user é somente-DML (sem DDL destrutivo)
        run: |
          ddl_negado() {
            if docker exec -e PGPASSWORD=app_ci pg-ci psql -U app_user -d servicetrack -qc "$2" >/dev/null 2>&1; then
              echo "::error::app_user conseguiu executar $1 (deveria ser negado)"; exit 1
            fi
            echo "$1 negado para app_user OK"
          }
          ddl_negado "CREATE"   "create table hack(id int);"
          ddl_negado "DROP"     "drop table usuarios;"
          ddl_negado "TRUNCATE" "truncate usuarios;"
          ddl_negado "ALTER"    "alter table usuarios add column hack int;"
          docker exec -e PGPASSWORD=app_ci pg-ci psql -U app_user -d servicetrack -tAc \
            "select count(*) from usuarios;" >/dev/null && echo "SELECT (DML) permitido OK"

      - name: Teardown
        if: always()
        run: docker rm -f pg-ci || true


  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    needs: [ domain, application, infrastructure ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Prepare coverage paths
        run: |
          mkdir -p _domain/build/reports/jacoco/test
          mkdir -p _application/build/reports/jacoco/test
          mkdir -p _infrastructure/build/reports/jacoco/test

          cp coverage/domain-coverage/jacocoTestReport.xml _domain/build/reports/jacoco/test/ || true
          cp coverage/application-coverage/jacocoTestReport.xml _application/build/reports/jacoco/test/ || true
          cp coverage/infrastructure-coverage/jacocoTestReport.xml _infrastructure/build/reports/jacoco/test/ || true

      - name: Run Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar