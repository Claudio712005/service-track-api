name: CI

on:
  push:
    branches: ["main", "develop", "fase-*"]
  pull_request:
    branches: ["main", "develop"]

defaults:
  run:
    working-directory: software/service-track-api

jobs:

  domain:
    name: Domain Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: domain-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew
      - run: ./gradlew :_domain:test :_domain:jacocoTestReport

      - uses: actions/upload-artifact@v4
        with:
          name: domain-coverage
          path: _domain/build/reports/jacoco/test/jacocoTestReport.xml


  application:
    name: Application Coverage
    runs-on: ubuntu-latest
    needs: domain
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: app-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew
      - run: ./gradlew :_application:test :_application:jacocoTestReport

      - uses: actions/upload-artifact@v4
        with:
          name: application-coverage
          path: _application/build/reports/jacoco/test/jacocoTestReport.xml


  infrastructure:
    name: Infrastructure Coverage
    runs-on: ubuntu-latest
    needs: application
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: infra-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts') }}

      - run: chmod +x gradlew

      - name: Generate JWT keys
        run: |
          mkdir -p _infrastructure/src/test/resources/keys
          openssl genrsa -out _infrastructure/src/test/resources/keys/privateKey.pem 2048
          openssl rsa -in _infrastructure/src/test/resources/keys/privateKey.pem \
            -pubout -out _infrastructure/src/test/resources/keys/publicKey.pem

      - run: ./gradlew :_infrastructure:test :_infrastructure:jacocoTestReport

      - uses: actions/upload-artifact@v4
        with:
          name: infrastructure-coverage
          path: _infrastructure/build/reports/jacoco/test/jacocoTestReport.xml


  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    needs: [ domain, application, infrastructure ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ runner.os }}

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Prepare coverage paths
        run: |
          mkdir -p _domain/build/reports/jacoco/test
          mkdir -p _application/build/reports/jacoco/test
          mkdir -p _infrastructure/build/reports/jacoco/test

          cp coverage/domain-coverage/jacocoTestReport.xml _domain/build/reports/jacoco/test/ || true
          cp coverage/application-coverage/jacocoTestReport.xml _application/build/reports/jacoco/test/ || true
          cp coverage/infrastructure-coverage/jacocoTestReport.xml _infrastructure/build/reports/jacoco/test/ || true

      - name: Run Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar